```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的自我介紹</title>

<style>
/* ===== 全域設定 ===== */
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    color: #333;
}

/* ===== 容器 ===== */
.container {
    max-width: 800px;
    margin: 50px auto;
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

/* ===== 動畫 ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== 頭像 ===== */
.profile {
    text-align: center;
}

.profile img {
    width: 150px;
    border-radius: 50%;
    border: 4px solid #74ebd5;
    transition: 0.3s;
}

.profile img:hover {
    transform: scale(1.1);
}

/* ===== 標題 ===== */
h1 {
    text-align: center;
    margin: 15px 0;
}

h2 {
    border-left: 5px solid #74ebd5;
    padding-left: 10px;
}

/* ===== 區塊 ===== */
.section {
    margin-top: 30px;
}

/* ===== 技能標籤 ===== */
.skills span {
    display: inline-block;
    background: #74ebd5;
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
    margin: 5px;
    font-size: 14px;
}

/* ===== 按鈕 ===== */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #74ebd5;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    background: #5ecdc4;
    transform: translateY(-2px);
}

/* ===== 響應式（手機） ===== */
@media (max-width: 600px) {
    .container {
        margin: 20px;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- 頭像 -->
    <div class="profile">
        <img src="https://via.placeholder.com/150" alt="我的照片">
        <h1>你的名字</h1>
        <p>前端工程師 / 學生</p>
    </div>

    <!-- 自我介紹 -->
    <div class="section">
        <h2>自我介紹</h2>
        <p>
            你好，我是XXX，目前正在學習網頁開發，對前端設計與互動效果很有興趣。
            希望未來可以成為一名優秀的工程師。
        </p>
    </div>

    <!-- 技能 -->
    <div class="section">
        <h2>技能</h2>
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
        </div>
    </div>

    <!-- 聯絡方式 -->
    <div class="section">
        <h2>聯絡我</h2>
        <p>Email：example@gmail.com</p>
        <a href="mailto:example@gmail.com" class="btn">寄信給我</a>
    </div>

</div>

</body>
</html>
```
